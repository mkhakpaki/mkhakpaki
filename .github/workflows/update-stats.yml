name: Update README Stats Cards

on:
  schedule:
    - cron: "0 3 * * *" # Runs automatically every single day at 3 AM UTC
  workflow_dispatch: # Allows you to manually trigger it anytime from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GRS_TOKEN }} # Uses your PAT to allow pushing commits back

      - name: Generate Main Stats Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=mkhakpaki&show_icons=true&theme=radical&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GRS_TOKEN }}

      - name: Generate Top Languages Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=mkhakpaki&layout=compact&theme=radical&count_private=true
          path: profile/top-langs.svg
          token: ${{ secrets.GRS_TOKEN }}

      - name: Commit and Push SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards with private metrics [skip ci]" || exit 0
          git push
